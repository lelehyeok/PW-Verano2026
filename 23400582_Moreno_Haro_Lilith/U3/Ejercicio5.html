<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>Google</title>
        <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
        <style>
            body{
                font-family: 'Poppins', sans-serif;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            header{
                display: flex;
                justify-content: flex-end;
                align-items: center;
                padding: 15px 20px;
            }

            header a{
                text-decoration: none;
                color: #1f1f1f;
                font-size: 14px;
                margin-right: 20px;
            }

            header a:hover{
                text-decoration: underline;
            }

            .acceder{
                background-color: #0b57d0;
                color: white;
                border: none;
                padding: 10px 25px;
                border-radius: 25px;
                font-size: 14px;
                font-weight: 500;
                font-family: 'Poppins', sans-serif;
                cursor: pointer;
            }

            .acceder:hover{
                background-color: #0842a0;
            }

            main{
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding-bottom: 100px;
            }

            .logo{
                font-size: 85px;
                font-weight: normal;
                letter-spacing: -10px;
                margin-bottom: 25px;
                user-select: none;
            }

            .g{
                color: #4285f4;
            }

            .o{
                color: #ea4335;
            }

            .o1{
                color: #fbbc05;
            }


            .l{
                color: #34a853;
            }

            .e{
                color: #ea4335;
            }
            
            .buscador{
                width: 100%;
                max-width: 580px;
                margin-bottom: 30px;
            }

            .buscador input{
                width: 100%;
                padding: 14px 20px;
                border: 1px solid #dfe1e5;
                border-radius: 24px;
                font-size: 16px;
                font-family: 'Poppins', sans-serif;
                outline: none;
            }

            .buscador input:hover, .buscador input:focus{
                box-shadow: 0 1px 6px rgba(32,33,36,.28);
                border-color: rgba(223,225,229,0);
            }

            .botones button{
                background-color: #f8f9fa;
                border: 1px solid #f8f9fa;
                border-radius: 4px;
                color: #3c4043;
                font-size: 14px;
                margin: 0 5px;
                padding: 10px 20px;
                font-family: 'Poppins', sans-serif;
                cursor: pointer;
            }

            .botones button:hover{
                box-shadow: 0 1px 1px rgba(0,0,0,.1);
                border: 1px solid #dadce0;
                color: #202124;
            }

            footer{
                background-color: #f2f2f2;
                color: #70757a;
                font-size: 14px;
            }

            .footer1{
                padding: 15px 30px;
                border-bottom: 1px solid #dadce0;
            }

            .footer2{
                display: flex;
                justify-content: space-between;
                padding: 15px 30px;
            }

            footer a{
                color: #70757a;
                text-decoration: none;
                margin-right: 25px;
            }

            footer a:hover {
                text-decoration: underline;
            }

            .ld a{
                margin-right: 0;
                margin-left: 25px;
            }

        </style>
    </head>

    <body>
        <header>
            <nav>
                <a href="#">Gmail</a>
                <a href="#">Imágenes</a>
                <button  class="acceder">Acceder</button>
            </nav>
        </header>

        <main>
            <h1 class="logo">
                <span class="g">G</span>
                <span class="o">o</span>
                <span class="o1">o</span>
                <span class="g">g</span>
                <span class="l">l</span>
                <span class="e">e</span>
            </h1>

            <div class="buscador">
                <input type="text" placeholder="Ingresa una búsqueda...">
            </div>

            <div class="botones">
                <button>Buscar con Google</button>
                <button>Voy a tener suerte</button>
            </div>
        </main>

        <footer>
            <div class="footer1">
                <p>México</p>
            </div>
            <div class="footer2">
                <div class="ll">
                    <a href="#">Sobre Google</a>
                    <a href="#">Publicidad</a>
                    <a href="#">Negocios</a>
                    <a href="#">Cómo funciona la búsqueda</a>
                </div>
                <div class="ld">
                    <a href="#">Privacidad</a>
                    <a href="#">Condiciones</a>
                    <a href="#">Configuración </a>
                </div>
            </div>
        </footer>
    </body>
</html>
